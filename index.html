<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — Network Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #04040f;
    --surface: #0c0c22;
    --node-self: #e8ff47;
    --node-close: #47c8ff;
    --node-mutual: #ff6b9d;
    --node-discover: #a78bfa;
    --edge: rgba(255,255,255,0.08);
    --edge-active: rgba(232,255,71,0.4);
    --text: #f0f0ff;
    --muted: rgba(240,240,255,0.4);
    --tag-bg: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  /* ── CANVAS ── */
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(4,4,15,0.9) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: var(--node-self);
  }

  .logo span { color: var(--text); }

  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .mode-pill {
    display: flex;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    overflow: hidden;
  }

  .mode-btn {
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.08em;
  }

  .mode-btn.active {
    background: var(--node-self);
    color: #04040f;
  }

  /* ── LEGEND ── */
  .legend {
    position: fixed;
    bottom: 100px;
    left: 28px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 28px 28px;
    background: linear-gradient(to top, rgba(4,4,15,0.95) 0%, transparent 100%);
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .hint {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
    letter-spacing: 0.04em;
  }

  .hint strong {
    color: var(--node-self);
    font-weight: 700;
  }

  /* ── PROFILE CARD ── */
  .profile-card {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%) translateX(120%);
    width: 280px;
    background: rgba(12,12,34,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 24px;
    z-index: 20;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(20px);
  }

  .profile-card.visible {
    transform: translateY(-50%) translateX(0);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #04040f;
    flex-shrink: 0;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 3px;
  }

  .card-role {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .card-section {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    padding: 4px 10px;
    background: var(--tag-bg);
    border-radius: 100px;
    font-size: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.04em;
  }

  .tag.highlight {
    background: rgba(232,255,71,0.1);
    border-color: rgba(232,255,71,0.3);
    color: var(--node-self);
  }

  .card-stat {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .stat-box {
    text-align: center;
    flex: 1;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .btn-primary {
    flex: 1;
    padding: 10px;
    background: var(--node-self);
    color: #04040f;
    border: none;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    padding: 10px 14px;
    background: var(--tag-bg);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .close-card {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 24px;
    height: 24px;
    background: var(--tag-bg);
    border: none;
    border-radius: 50%;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── ORBIT RIPPLE on hover ── */
  .orbit-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(232,255,71,0.15);
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: ripple-out 1.5s ease-out forwards;
  }

  @keyframes ripple-out {
    from { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    to   { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
  }

  /* ── SEARCH ── */
  .search-bar {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(12,12,34,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(10px);
    width: 300px;
  }

  .search-bar input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--muted); }

  .search-icon { color: var(--muted); font-size: 14px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--node-self);
    color: #04040f;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 30;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">ORBIT<span>.</span></div>
  <div class="header-right">
    <div class="mode-pill">
      <button class="mode-btn active" onclick="setMode('explore')">EXPLORE</button>
      <button class="mode-btn" onclick="setMode('mindset')">MINDSET</button>
      <button class="mode-btn" onclick="setMode('collab')">COLLAB</button>
    </div>
  </div>
</header>

<!-- Search -->
<div class="search-bar">
  <span class="search-icon">⌖</span>
  <input type="text" placeholder="search by skill, city, intent..." id="searchInput">
</div>

<!-- Main Canvas -->
<canvas id="canvas"></canvas>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#e8ff47"></div>YOU</div>
  <div class="legend-item"><div class="legend-dot" style="background:#47c8ff"></div>1st ORBIT</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b9d"></div>MUTUAL INTERESTS</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>DISCOVER</div>
</div>

<!-- Profile Card -->
<div class="profile-card" id="profileCard">
  <button class="close-card" onclick="closeCard()">×</button>
  <div class="card-header">
    <div class="avatar" id="cardAvatar">A</div>
    <div>
      <div class="card-name" id="cardName">Aryan Mehta</div>
      <div class="card-role" id="cardRole">ML Engineer · Bangalore</div>
    </div>
  </div>
  <div class="card-section">SHARED MINDSET</div>
  <div class="tags" id="cardSharedTags"></div>
  <div class="card-section">ALSO INTO</div>
  <div class="tags" id="cardOtherTags"></div>
  <div class="card-stat">
    <div class="stat-box">
      <div class="stat-num" id="cardConnections">142</div>
      <div class="stat-label">ORBIT</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="cardMutual">12</div>
      <div class="stat-label">MUTUAL</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="cardScore">94%</div>
      <div class="stat-label">MATCH</div>
    </div>
  </div>
  <div class="card-actions">
    <button class="btn-primary" onclick="sendOrbit()">ENTER ORBIT</button>
    <button class="btn-secondary" onclick="closeCard()">↗</button>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="hint">
    <strong>CLICK</strong> a node to view · <strong>DRAG</strong> to explore<br>
    <strong>SCROLL</strong> to zoom into clusters
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Connection request sent!</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let nodes = [], edges = [];
let hoveredNode = null;
let selectedNode = null;
let dragging = false;
let dragNode = null;
let offsetX, offsetY;
let pan = { x: 0, y: 0 };
let zoom = 1;
let lastMouse = { x: 0, y: 0 };
let isPanning = false;
let animFrame = 0;

const COLORS = {
  self: '#e8ff47',
  close: '#47c8ff',
  mutual: '#ff6b9d',
  discover: '#a78bfa'
};

const PEOPLE = [
  { name: 'You', role: 'Oracle ERP · MTech DS', type: 'self', tags: ['Data Science', 'PL/SQL', 'ML'], city: 'Hyderabad' },
  { name: 'Aryan M.', role: 'ML Engineer', type: 'close', tags: ['ML', 'Python', 'Startups'], city: 'Bangalore' },
  { name: 'Priya S.', role: 'Data Analyst', type: 'close', tags: ['Data Science', 'Viz', 'Finance'], city: 'Mumbai' },
  { name: 'Rohan K.', role: 'Backend Dev', type: 'close', tags: ['APIs', 'Node.js', 'SaaS'], city: 'Pune' },
  { name: 'Sneha R.', role: 'Product Designer', type: 'mutual', tags: ['UX', 'Figma', 'Startups'], city: 'Delhi' },
  { name: 'Kiran T.', role: 'Research Scholar', type: 'mutual', tags: ['NLP', 'ML', 'Academia'], city: 'Chennai' },
  { name: 'Aditya P.', role: 'Founder', type: 'mutual', tags: ['Startups', 'SaaS', 'Growth'], city: 'Bangalore' },
  { name: 'Meera J.', role: 'Data Engineer', type: 'mutual', tags: ['Spark', 'Data Science', 'AWS'], city: 'Hyderabad' },
  { name: 'Dev C.', role: 'iOS Developer', type: 'discover', tags: ['Swift', 'Mobile', 'Fitness'], city: 'Gurgaon' },
  { name: 'Ananya B.', role: 'VC Analyst', type: 'discover', tags: ['Finance', 'Startups', 'Strategy'], city: 'Mumbai' },
  { name: 'Vivek N.', role: 'Quant Trader', type: 'discover', tags: ['Python', 'Finance', 'ML'], city: 'Bangalore' },
  { name: 'Isha G.', role: 'UX Researcher', type: 'discover', tags: ['Research', 'UX', 'Psychology'], city: 'Delhi' },
  { name: 'Rahul V.', role: 'SRE / Infra', type: 'discover', tags: ['Kubernetes', 'AWS', 'DevOps'], city: 'Pune' },
  { name: 'Kavya M.', role: 'Bioinformatics', type: 'discover', tags: ['Python', 'Data Science', 'Biology'], city: 'Hyderabad' },
];

const YOUR_TAGS = ['Data Science', 'PL/SQL', 'ML', 'Python'];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}

function initNodes() {
  const self = PEOPLE[0];
  nodes = PEOPLE.map((p, i) => {
    if (i === 0) return { ...p, x: cx, y: cy, vx: 0, vy: 0, r: 22, index: 0 };
    const angle = (i / (PEOPLE.length - 1)) * Math.PI * 2;
    const dist = p.type === 'close' ? 130 : p.type === 'mutual' ? 230 : 340 + Math.random() * 60;
    return {
      ...p,
      x: cx + Math.cos(angle) * dist + (Math.random() - 0.5) * 40,
      y: cy + Math.sin(angle) * dist + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      r: p.type === 'close' ? 14 : p.type === 'mutual' ? 12 : 9,
      index: i
    };
  });

  edges = [];
  // Connect self to close
  for (let i = 1; i < nodes.length; i++) {
    if (nodes[i].type === 'close') edges.push([0, i]);
  }
  // Some mutual connections
  edges.push([1, 4], [1, 5], [2, 6], [3, 7], [4, 8], [5, 9], [6, 10], [7, 11]);
  // Discover bridges
  edges.push([4, 12], [5, 13]);
}

function getColor(type) {
  return COLORS[type] || COLORS.discover;
}

function drawGlow(x, y, r, color, alpha = 0.15) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
  grad.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r * 3, 0, Math.PI * 2);
  ctx.fill();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function tick() {
  animFrame++;
  // Gentle float
  nodes.forEach((n, i) => {
    if (i === 0 || dragNode === n) return;
    n.x += n.vx;
    n.y += n.vy;
    // Soft attraction to initial orbit radius
    const dx = n.x - cx, dy = n.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const targetDist = n.type === 'close' ? 130 : n.type === 'mutual' ? 230 : 350;
    const force = (dist - targetDist) * 0.0008;
    n.vx -= (dx / dist) * force;
    n.vy -= (dy / dist) * force;
    // Dampen
    n.vx *= 0.98;
    n.vy *= 0.98;
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(pan.x, pan.y);
  ctx.scale(zoom, zoom);

  // ── ORBIT RINGS ──
  const self = nodes[0];
  [130, 230, 370].forEach((r, i) => {
    ctx.beginPath();
    ctx.arc(self.x, self.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${0.04 - i*0.01})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // ── EDGES ──
  edges.forEach(([a, b]) => {
    const na = nodes[a], nb = nodes[b];
    const isHighlighted = hoveredNode && (hoveredNode === na || hoveredNode === nb);
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.lineTo(nb.x, nb.y);
    if (isHighlighted) {
      ctx.strokeStyle = `rgba(232,255,71,0.5)`;
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = `rgba(255,255,255,0.06)`;
      ctx.lineWidth = 1;
    }
    ctx.stroke();
  });

  // ── NODES ──
  nodes.forEach((n, i) => {
    const color = getColor(n.type);
    const rgb = hexToRgb(color);
    const isHovered = hoveredNode === n;
    const isSelected = selectedNode === n;
    const pulse = Math.sin(animFrame * 0.03 + i * 0.7) * 0.5 + 0.5;

    // Glow
    if (isHovered || isSelected || n.type === 'self') {
      const glowR = n.r * (isHovered ? 4 : 3);
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
      grad.addColorStop(0, `rgba(${rgb},${isHovered ? 0.3 : 0.15})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Pulse ring for self
    if (n.type === 'self') {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 6 + pulse * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb},${0.3 - pulse * 0.2})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Main circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, isHovered ? n.r + 2 : n.r, 0, Math.PI * 2);

    if (n.type === 'self') {
      ctx.fillStyle = color;
    } else {
      const grad = ctx.createRadialGradient(n.x - n.r*0.3, n.y - n.r*0.3, 0, n.x, n.y, n.r);
      grad.addColorStop(0, `rgba(${rgb},0.9)`);
      grad.addColorStop(1, `rgba(${rgb},0.5)`);
      ctx.fillStyle = grad;
    }
    ctx.fill();

    // Border
    ctx.strokeStyle = `rgba(${rgb}, ${isHovered ? 0.9 : 0.4})`;
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.stroke();

    // Initial
    if (n.r >= 12 || isHovered) {
      ctx.fillStyle = n.type === 'self' ? '#04040f' : `rgba(255,255,255,${isHovered ? 1 : 0.7})`;
      ctx.font = `bold ${n.r * 0.7}px Syne, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.name[0], n.x, n.y);
    }

    // Label on hover
    if (isHovered) {
      const label = n.name.split(' ')[0];
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '11px Space Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(label, n.x, n.y + n.r + 14);
    }
  });

  ctx.restore();

  tick();
  requestAnimationFrame(draw);
}

// ── INTERACTION ──
function worldPos(ex, ey) {
  return {
    x: (ex - pan.x) / zoom,
    y: (ey - pan.y) / zoom
  };
}

function nodeAt(ex, ey) {
  const { x, y } = worldPos(ex, ey);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = n.x - x, dy = n.y - y;
    if (dx*dx + dy*dy < (n.r + 8) * (n.r + 8)) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const hit = nodeAt(e.clientX, e.clientY);
  hoveredNode = hit;
  canvas.style.cursor = hit ? 'pointer' : isPanning ? 'grabbing' : 'grab';

  if (dragNode) {
    const { x, y } = worldPos(e.clientX, e.clientY);
    dragNode.x = x;
    dragNode.y = y;
    dragNode.vx = 0;
    dragNode.vy = 0;
  } else if (isPanning) {
    pan.x += e.clientX - lastMouse.x;
    pan.y += e.clientY - lastMouse.y;
  }
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousedown', e => {
  const hit = nodeAt(e.clientX, e.clientY);
  if (hit) { dragNode = hit; }
  else { isPanning = true; canvas.style.cursor = 'grabbing'; }
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', e => {
  if (dragNode) { dragNode = null; }
  else if (isPanning) { isPanning = false; }
});

canvas.addEventListener('click', e => {
  const hit = nodeAt(e.clientX, e.clientY);
  if (hit && hit.type !== 'self') {
    selectedNode = hit;
    showCard(hit);
  } else if (!hit) {
    closeCard();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  zoom = Math.max(0.4, Math.min(3, zoom * factor));
}, { passive: false });

// Touch
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const hit = nodeAt(t.clientX, t.clientY);
  hoveredNode = hit;
  if (dragNode) {
    const { x, y } = worldPos(t.clientX, t.clientY);
    dragNode.x = x; dragNode.y = y;
  }
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const hit = nodeAt(t.clientX, t.clientY);
  if (hit) dragNode = hit;
  lastMouse = { x: t.clientX, y: t.clientY };
});

canvas.addEventListener('touchend', e => {
  if (dragNode && !dragging) {
    const hit = dragNode;
    if (hit.type !== 'self') showCard(hit);
  }
  dragNode = null;
  dragging = false;
});

// ── CARD ──
function showCard(node) {
  const card = document.getElementById('profileCard');
  document.getElementById('cardName').textContent = node.name;
  document.getElementById('cardRole').textContent = `${node.role} · ${node.city}`;

  const avatar = document.getElementById('cardAvatar');
  avatar.textContent = node.name[0];
  avatar.style.background = getColor(node.type);

  // Shared tags
  const shared = node.tags.filter(t => YOUR_TAGS.includes(t));
  const other = node.tags.filter(t => !YOUR_TAGS.includes(t));
  document.getElementById('cardSharedTags').innerHTML = shared.map(t =>
    `<span class="tag highlight">${t}</span>`).join('');
  document.getElementById('cardOtherTags').innerHTML = other.map(t =>
    `<span class="tag">${t}</span>`).join('');

  document.getElementById('cardConnections').textContent = Math.floor(Math.random()*200+50);
  document.getElementById('cardMutual').textContent = Math.floor(Math.random()*15+3);
  const matchScore = shared.length === 0 ? Math.floor(Math.random()*30+40)
    : Math.floor(shared.length / node.tags.length * 100);
  document.getElementById('cardScore').textContent = matchScore + '%';

  card.classList.add('visible');
}

function closeCard() {
  document.getElementById('profileCard').classList.remove('visible');
  selectedNode = null;
}

function sendOrbit() {
  showToast('Orbit request sent! ✦');
  closeCard();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (mode === 'mindset') {
    showToast('Showing mindset-matched nodes ✦');
  } else if (mode === 'collab') {
    showToast('Showing collaboration potential ✦');
  }
}

// ── INIT ──
resize();
window.addEventListener('resize', () => { resize(); });
initNodes();
draw();
</script>
</body>
